spring:
    application:
        name: FSneaker
    output:
        ansi:
            enabled: ALWAYS
    datasource:
        url: jdbc:sqlserver://localhost:1433;databaseName=FSneakers;encrypt=true;trustServerCertificate=true
        username: sa
        password: 123
        driverClassName: com.microsoft.sqlserver.jdbc.SQLServerDriver
    jpa:
        hibernate:
            ddl-auto: none
        show-sql: true
        properties:
            hibernate:
                dialect: org.hibernate.dialect.SQLServer2012Dialect

server:
    port: 8081
    
